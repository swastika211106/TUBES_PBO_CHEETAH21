<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Setup Admin - Daily Activity</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #7b8df5 0%, #9b59b6 50%, #7b68ee 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card {
      width: 420px; max-width: 100%;
      background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      overflow: hidden;
      animation: emergeFromBackground 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes emergeFromBackground {
      0% { opacity: 0; transform: scale(0.85) translateZ(-150px); filter: blur(12px); }
      100% { opacity: 1; transform: scale(1) translateZ(0); filter: blur(0); }
    }
    .login-top {
      background: linear-gradient(135deg, #3b4fd8 0%, #5b6ef5 100%);
      padding: 36px 40px 32px; text-align: center;
    }
    .login-icon {
      width: 60px; height: 60px; border-radius: 16px;
      background: rgba(255,255,255,.18); display: inline-flex;
      align-items: center; justify-content: center; margin-bottom: 16px;
    }
    .login-icon i { font-size: 26px; color: #fff; }
    .login-app-name { color: #fff; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .login-subtitle { color: rgba(255,255,255,.8); font-size: 13px; }
    .login-body { padding: 32px 40px 28px; }
    .form-group { margin-bottom: 18px; }
    .form-label { font-size: 14px; font-weight: 600; color: #1e2236; display: block; margin-bottom: 8px; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 14px; }
    .form-control {
      width: 100%; padding: 11px 13px 11px 38px;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: 14px; color: #1e2236; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    .form-control:focus { border-color: #3b4fd8; }
    .btn-login {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #3b4fd8, #5b6ef5);
      color: #fff; font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s; margin-top: 6px;
    }
    .btn-login:hover { opacity: .9; }
    .login-footer { text-align: center; margin-top: 16px; font-size: 13px; color: #6b7280; }
    .login-footer a { color: #3b4fd8; font-weight: 600; text-decoration: none; }

    /* ─── BACKGROUND ANIMATION ─── */
    .bg-animated { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; overflow: hidden; background: transparent; pointer-events: none; }
    .bg-item { position: absolute; color: rgba(255,255,255,0.8); font-weight: 800; font-family: monospace; animation: floatUp linear infinite; bottom: -150px; display: flex; align-items: center; justify-content: center; opacity: 0; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
      10% { opacity: 0.3; }
      50% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-120vh) rotate(360deg) scale(1.2); opacity: 0; }
    }
    .bg-item:nth-child(1) { left: 5%; animation-duration: 12s; animation-delay: 0s; font-size: 40px; }
    .bg-item:nth-child(2) { left: 15%; animation-duration: 16s; animation-delay: 2s; font-size: 60px; }
    .bg-item:nth-child(3) { left: 25%; animation-duration: 11s; animation-delay: 5s; font-size: 30px; }
    .bg-item:nth-child(4) { left: 35%; animation-duration: 14s; animation-delay: 1s; font-size: 45px; }
    .bg-item:nth-child(5) { left: 45%; animation-duration: 10s; animation-delay: 3s; font-size: 55px; }
    .bg-item:nth-child(6) { left: 55%; animation-duration: 13s; animation-delay: 6s; font-size: 35px; }
    .bg-item:nth-child(7) { left: 65%; animation-duration: 15s; animation-delay: 0s; font-size: 50px; }
    .bg-item:nth-child(8) { left: 75%; animation-duration: 18s; animation-delay: 4s; font-size: 65px; }
    .bg-item:nth-child(9) { left: 85%; animation-duration: 12s; animation-delay: 2s; font-size: 40px; }
    .bg-item:nth-child(10) { left: 95%; animation-duration: 14s; animation-delay: 7s; font-size: 55px; }
    .bg-item:nth-child(11) { left: 8%; animation-duration: 17s; animation-delay: 1s; font-size: 30px; }
    .bg-item:nth-child(12) { left: 18%; animation-duration: 11s; animation-delay: 8s; font-size: 45px; }
    .bg-item:nth-child(13) { left: 28%; animation-duration: 15s; animation-delay: 3s; font-size: 50px; }
    .bg-item:nth-child(14) { left: 38%; animation-duration: 13s; animation-delay: 6s; font-size: 35px; }
    .bg-item:nth-child(15) { left: 48%; animation-duration: 16s; animation-delay: 2s; font-size: 60px; }
    .bg-item:nth-child(16) { left: 58%; animation-duration: 10s; animation-delay: 5s; font-size: 40px; }
    .bg-item:nth-child(17) { left: 68%; animation-duration: 14s; animation-delay: 1s; font-size: 55px; }
    .bg-item:nth-child(18) { left: 78%; animation-duration: 19s; animation-delay: 9s; font-size: 30px; }
    .bg-item:nth-child(19) { left: 88%; animation-duration: 12s; animation-delay: 4s; font-size: 45px; }
    .bg-item:nth-child(20) { left: 92%; animation-duration: 15s; animation-delay: 0s; font-size: 50px; }
    .bg-item:nth-child(21) { left: 12%; animation-duration: 13s; animation-delay: 6s; font-size: 35px; }
    .bg-item:nth-child(22) { left: 32%; animation-duration: 17s; animation-delay: 2s; font-size: 65px; }
    .bg-item:nth-child(23) { left: 52%; animation-duration: 11s; animation-delay: 8s; font-size: 40px; }
    .bg-item:nth-child(24) { left: 72%; animation-duration: 14s; animation-delay: 3s; font-size: 55px; }
    .bg-item:nth-child(25) { left: 82%; animation-duration: 16s; animation-delay: 5s; font-size: 30px; }
    .login-card { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <!-- BG ANIMATION -->
  <div class="bg-animated">
     <div class="bg-item"><i class="fas fa-code"></i></div>
     <div class="bg-item"><i class="fas fa-box"></i></div>
     <div class="bg-item"><i class="fas fa-server"></i></div>
     <div class="bg-item"><i class="fas fa-chart-line"></i></div>
     <div class="bg-item"><span>{ }</span></div>
     <div class="bg-item"><i class="fas fa-boxes-stacked"></i></div>
     <div class="bg-item"><i class="fas fa-microchip"></i></div>
     <div class="bg-item"><span>&lt;/&gt;</span></div>
     <div class="bg-item"><i class="fas fa-database"></i></div>
     <div class="bg-item"><i class="fas fa-network-wired"></i></div>
     <div class="bg-item"><i class="fas fa-cube"></i></div>
     <div class="bg-item"><i class="fas fa-laptop-code"></i></div>
     <div class="bg-item"><i class="fas fa-shield-halved"></i></div>
     <div class="bg-item"><i class="fas fa-memory"></i></div>
     <div class="bg-item"><span>()</span></div>
     <div class="bg-item"><i class="fas fa-wifi"></i></div>
     <div class="bg-item"><i class="fas fa-cloud"></i></div>
     <div class="bg-item"><i class="fas fa-folder-open"></i></div>
     <div class="bg-item"><i class="fas fa-gears"></i></div>
     <div class="bg-item"><span>[ ]</span></div>
     <div class="bg-item"><i class="fas fa-bug"></i></div>
     <div class="bg-item"><i class="fas fa-keyboard"></i></div>
     <div class="bg-item"><i class="fas fa-terminal"></i></div>
     <div class="bg-item"><i class="fas fa-hdd"></i></div>
     <div class="bg-item"><i class="fas fa-lock"></i></div>
  </div>

  <div class="login-card">
    <div class="login-top">
      <div class="login-icon"><i class="fas fa-user-shield"></i></div>
      <div class="login-app-name">Setup Admin</div>
      <div class="login-subtitle">Buat akun admin pertama Anda</div>
    </div>
    <div class="login-body">
      <form method="POST" action="/setup-admin">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <div class="input-wrap">
            <i class="fas fa-id-badge input-icon"></i>
            <input class="form-control" type="text" name="fullName" placeholder="Masukkan nama lengkap" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input class="form-control" type="text" name="username" placeholder="Masukkan username" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input class="form-control" type="password" name="password" placeholder="Masukkan password" required/>
          </div>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-check"></i> Buat Admin</button>
      </form>
      <div class="login-footer">
        Sudah punya akun? <a href="/login">Kembali ke Login</a>
      </div>
    </div>
  </div>
</body>
</html>
